  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .pattern-bg {
      background-color: #0f766e;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    
    .scroll-smooth { scroll-behavior: smooth; }
    
    .category-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .category-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
    }
    
    @media (max-width: 640px) {
      .category-card:active {
        transform: scale(0.95);
      }
    }
    
    .doa-card {
      transition: all 0.3s ease;
    }
    
    .doa-card:hover {
      box-shadow: 0 10px 30px -10px rgba(15, 118, 110, 0.3);
    }
    
    @media (max-width: 640px) {
      .doa-card:active {
        opacity: 0.8;
      }
    }
    
    .fade-in {
      animation: fadeIn 0.4s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .slide-up {
      animation: slideUp 0.5s ease-out;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .pulse-gentle {
      animation: pulseGentle 2s ease-in-out infinite;
    }
    
    @keyframes pulseGentle {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    /* Loading Animations */
    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-dots {
      display: inline-flex;
      gap: 4px;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      background-color: currentColor;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }

    .loading-dots span:nth-child(1) {
      animation-delay: 0s;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% { 
        transform: scale(0.8);
        opacity: 0.6;
      }
      40% { 
        transform: scale(1);
        opacity: 1;
      }
    }

    .loading-bar {
      position: relative;
      width: 100%;
      height: 2px;
      background-color: transparent;
      overflow: hidden;
      border-radius: 1px;
    }

    .loading-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(20, 184, 166, 0.4), transparent);
      animation: subtleShimmer 2s ease-in-out infinite;
    }

    @keyframes subtleShimmer {
      0%, 100% { transform: translateX(-100%); opacity: 0; }
      50% { opacity: 0.6; }
    }

    .skeleton {
      background: linear-gradient(90deg, #e5f0f0 25%, #f5f5f5 50%, #e5f0f0 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
    }

    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    footer {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .footer-link {
      transition: all 0.3s ease;
    }

    .footer-link:hover {
      color: #14b8a6;
      transform: translateX(2px);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #0f766e; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #0d9488; }

    /* Responsive Typography */
    @media (max-width: 640px) {
      header { position: relative; }
      header h1 { font-size: 1.125rem; }
      header p { font-size: 0.75rem; }
      main { padding: 1rem 0.75rem; }
      .max-w-4xl { width: 100%; }
    }

    @media (max-width: 480px) {
      header { padding: 0.5rem 0; }
      header h1 { font-size: 1rem; }
      main { padding: 0.75rem 0.5rem; }
    }

    /* Flexible Grid */
    @media (min-width: 1024px) {
      .grid-responsive { grid-template-columns: repeat(4, 1fr); }
    }

    @media (min-width: 768px) and (max-width: 1023px) {
      .grid-responsive { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 767px) {
      .grid-responsive { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      .grid-responsive { grid-template-columns: repeat(1, 1fr); gap: 0.75rem; }
    }
  </style>

              arabic: 'اَللّٰهُمَّ اكْفِنِيْ بِحَلَالِكَ عَنْ حَرَامِكَ وَأَغْنِنِيْ بِفَضْلِكَ عَمَّنْ سِوَاكَ',
              latin: "Allaahummakfinii bihalaalika 'an haroomika wa aghninii bifadlika 'amman siwaak",
              arti: 'Ya Allah, cukupkanlah aku dengan rezeki yang halal dari-Mu sehingga aku tidak memerlukan yang haram, dan cukupkanlah aku dengan karunia-Mu sehingga aku tidak memerlukan selain-Mu.',
              sumber: 'HR. Tirmidzi'
            },
            {
              id: 23,
              title: 'Do\'a Membuka Usaha',
              arabic: 'اَللّٰهُمَّ بَارِكْ لِيْ فِيْ رِزْقِيْ',
              latin: 'Allaahumma baarik lii fi rizqi',
              arti: 'Ya Allah, berkahilah aku dalam rezekiku.',
              sumber: 'HR. Bukhari'
            },
            {
              id: 24,
              title: 'Do\'a Syukur atas Rezeki',
              arabic: 'اَلْحَمْدُ لِلّٰهِ الَّذِيْ أَعْطَى فَأَغْنَى',
              latin: "Alhamdulillaahilladzi a'thaa fa aghna",
              arti: 'Segala puji bagi Allah yang memberikan sehingga menjadi kaya.',
              sumber: 'HR. Muslim'
            },

          ]
        }
      ]
    };

    // State management
    let currentView = 'home';
    let currentCategory = null;
    let currentDoa = null;
    let searchQuery = '';

    // DOM Elements
    const homeView = document.getElementById('homeView');
    const categoryView = document.getElementById('categoryView');
    const detailView = document.getElementById('detailView');
    const searchResults = document.getElementById('searchResults');
    const backBtn = document.getElementById('backBtn');
    const searchToggle = document.getElementById('searchToggle');
    const searchBar = document.getElementById('searchBar');
    const searchInput = document.getElementById('searchInput');
    const categoriesGrid = document.getElementById('categoriesGrid');
    const doaList = document.getElementById('doaList');
    const doaDetail = document.getElementById('doaDetail');
    const searchResultsList = document.getElementById('searchResultsList');
    const headerTitle = document.getElementById('headerTitle');
    const headerSubtitle = document.getElementById('headerSubtitle');

    // Render categories
    function renderCategories() {
      categoriesGrid.innerHTML = doaDatabase.categories.map((cat, index) => `
        <button onclick="openCategory('${cat.id}')" class="category-card glass-card rounded-2xl p-5 text-center hover:shadow-xl transition-all group" style="animation-delay: ${index * 0.08}s">
          <div class="relative">
            <div class="w-14 h-14 mx-auto mb-3 rounded-xl bg-gradient-to-br ${cat.color} flex items-center justify-center text-white shadow-lg group-hover:scale-110 transition-transform group-hover:shadow-2xl">
              ${cat.icon}
            </div>
            <h3 class="font-semibold text-teal-800 text-sm group-hover:text-emerald-600 transition-colors">${cat.name}</h3>
            <div class="flex items-center justify-center gap-1 mt-1">
              <span class="inline-block w-2 h-2 rounded-full bg-teal-500"></span>
              <p class="text-xs text-teal-500">${cat.doas.length} do'a</p>
            </div>
          </div>
        </button>
      `).join('');
      
      // Update stats
      const totalDoas = doaDatabase.categories.reduce((sum, cat) => sum + cat.doas.length, 0);
      const totalCategories = doaDatabase.categories.length;
      
      const statsContent = document.querySelector('.mt-8.glass-card');
      if (statsContent) {
        statsContent.innerHTML = `
          <div class="grid grid-cols-3 gap-4 text-center">
            <div class="space-y-2">
              <div class="text-3xl font-bold text-teal-700">${totalDoas}</div>
              <p class="text-sm text-teal-600">Total Do'a</p>
            </div>
            <div class="space-y-2">
              <div class="text-3xl font-bold text-teal-700">${totalCategories}</div>
              <p class="text-sm text-teal-600">Kategori</p>
            </div>
            <div class="space-y-2">
              <div class="text-3xl font-bold text-teal-600">
                <svg class="w-8 h-8 mx-auto inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0M3 3l18 18"/>
                </svg>
              </div>
              <p class="text-sm text-teal-600">Offline Ready</p>
            </div>
          </div>
        `;
      }
    }

    // Open category
    function openCategory(categoryId) {
      currentCategory = doaDatabase.categories.find(c => c.id === categoryId);
      if (!currentCategory) return;

      // Show loading
      showLoadingState();

      currentView = 'category';
      updateView();
      
      headerSubtitle.textContent = currentCategory.name;
      
      // Simulate loading delay for smooth transition
      setTimeout(() => {
        doaList.innerHTML = currentCategory.doas.map((doa, index) => `
          <div class="doa-card glass-card rounded-xl p-4 cursor-pointer" onclick="openDoa(${doa.id})">
            <div class="flex items-start gap-3">
              <div class="w-10 h-10 rounded-lg bg-gradient-to-br ${currentCategory.color} flex items-center justify-center text-white font-bold text-sm flex-shrink-0">
                ${index + 1}
              </div>
              <div class="flex-1 min-w-0">
                <h4 class="font-semibold text-teal-800 mb-1">${doa.title}</h4>
                <p class="text-teal-600 text-sm line-clamp-1 font-arabic text-right" dir="rtl">${doa.arabic.substring(0, 50)}...</p>
              </div>
              <svg class="w-5 h-5 text-teal-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
              </svg>
            </div>
          </div>
        `).join('');
        hideLoadingState();
      }, 300);
    }

    // Open doa detail
    function openDoa(doaId) {
      let foundDoa = null;
      let foundCategory = null;
      
      for (const cat of doaDatabase.categories) {
        const doa = cat.doas.find(d => d.id === doaId);
        if (doa) {
          foundDoa = doa;
          foundCategory = cat;
          break;
        }
      }
      
      if (!foundDoa) return;

      // Show loading
      showLoadingState();
      
      currentDoa = foundDoa;
      currentCategory = foundCategory;
      currentView = 'detail';
      updateView();
      
      headerSubtitle.textContent = foundDoa.title;
      
      // Simulate loading delay for smooth transition
      setTimeout(() => {
        doaDetail.innerHTML = `
          <div class="bg-gradient-to-br ${foundCategory.color} p-6 text-white">
            <div class="flex items-center gap-3 mb-4">
              <div class="w-12 h-12 rounded-xl bg-white/20 flex items-center justify-center">
                ${foundCategory.icon}
              </div>
              <div>
                <p class="text-white/80 text-sm">${foundCategory.name}</p>
                <h2 class="text-xl font-bold">${foundDoa.title}</h2>
              </div>
            </div>
          </div>
          
          <div class="p-6 space-y-6">
            <!-- Arabic -->
            <div class="bg-gradient-to-br from-teal-50 to-emerald-50 rounded-xl p-5 border border-teal-100">
              <div class="flex items-center gap-2 mb-3">
                <svg class="w-5 h-5 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                </svg>
                <span class="font-semibold text-teal-800">Bacaan Arab</span>
              </div>
              <p class="text-2xl font-arabic text-teal-900 leading-loose text-right" dir="rtl">${foundDoa.arabic}</p>
            </div>
            
            <!-- Latin -->
            <div class="bg-slate-50 rounded-xl p-5 border border-slate-200">
              <div class="flex items-center gap-2 mb-3">
                <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>
                </svg>
                <span class="font-semibold text-slate-700">Bacaan Latin</span>
              </div>
              <p class="text-slate-700 italic leading-relaxed">${foundDoa.latin}</p>
            </div>
            
            <!-- Arti -->
            <div class="bg-amber-50 rounded-xl p-5 border border-amber-200">
              <div class="flex items-center gap-2 mb-3">
                <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <span class="font-semibold text-amber-800">Arti</span>
              </div>
              <p class="text-amber-900 leading-relaxed">${foundDoa.arti}</p>
            </div>

            <!-- Sumber -->
            <div class="flex items-center justify-center gap-2 text-sm text-teal-600 bg-teal-50 rounded-lg py-2 px-4">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span>Sumber: <strong>${foundDoa.sumber}</strong></span>
            </div>
            
            <!-- Catatan Sanad (Removed per user request) -->
            
            <!-- Share Button -->
            <button onclick="copyDoa()" class="w-full py-3 px-4 bg-gradient-to-r from-teal-600 to-emerald-600 text-white rounded-xl font-semibold hover:from-teal-700 hover:to-emerald-700 transition-all flex items-center justify-center gap-2 shadow-lg">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
              </svg>
              Salin Doa
            </button>
          </div>
        `;
        hideLoadingState();
      }, 300);
    }

    function copyDoa() {
      if (!currentDoa) return;
      
      const text = `${currentDoa.title}\n\n${currentDoa.arabic}\n\n${currentDoa.latin}\n\nArtinya: ${currentDoa.arti}\n\nSumber: ${currentDoa.sumber}`;
      
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('#doaDetail button');
        const originalText = btn.innerHTML;
        btn.innerHTML = `
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          Tersalin!
        `;
        btn.classList.remove('from-teal-600', 'to-emerald-600');
        btn.classList.add('from-green-500', 'to-emerald-500');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('from-green-500', 'to-emerald-500');
          btn.classList.add('from-teal-600', 'to-emerald-600');
        }, 2000);
      });
    }

    // Search functionality
    function performSearch(query) {
      searchQuery = query.toLowerCase().trim();
      
      if (!searchQuery) {
        currentView = 'home';
        updateView();
        return;
      }
      
      const results = [];
      
      for (const cat of doaDatabase.categories) {
        for (const doa of cat.doas) {
          if (
            doa.title.toLowerCase().includes(searchQuery) ||
            doa.latin.toLowerCase().includes(searchQuery) ||
            doa.arti.toLowerCase().includes(searchQuery)
          ) {
            results.push({ ...doa, category: cat });
          }
        }
      }
      
      currentView = 'search';
      updateView();
      
      if (results.length === 0) {
        searchResultsList.innerHTML = `
          <div class="glass-card rounded-xl p-6 text-center">
            <svg class="w-16 h-16 mx-auto mb-4 text-teal-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p class="text-teal-700 font-medium">Tidak ada hasil untuk "${searchQuery}"</p>
            <p class="text-teal-500 text-sm mt-1">Coba kata kunci lain</p>
          </div>
        `;
      } else {
        searchResultsList.innerHTML = results.map((doa, index) => `
          <div class="doa-card glass-card rounded-xl p-4 cursor-pointer fade-in" style="animation-delay: ${index * 0.05}s" onclick="openDoa(${doa.id})">
            <div class="flex items-start gap-3">
              <div class="w-10 h-10 rounded-lg bg-gradient-to-br ${doa.category.color} flex items-center justify-center text-white flex-shrink-0">
                ${doa.category.icon.replace('w-8 h-8', 'w-5 h-5')}
              </div>
              <div class="flex-1 min-w-0">
                <p class="text-xs text-teal-500 mb-1">${doa.category.name}</p>
                <h4 class="font-semibold text-teal-800 mb-1">${doa.title}</h4>
                <p class="text-teal-600 text-sm line-clamp-1 font-arabic text-right" dir="rtl">${doa.arabic.substring(0, 40)}...</p>
              </div>
              <svg class="w-5 h-5 text-teal-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
              </svg>
            </div>
          </div>
        `).join('');
      }
    }

    // Update view
    function updateView() {
      homeView.classList.add('hidden');
      categoryView.classList.add('hidden');
      detailView.classList.add('hidden');
      searchResults.classList.add('hidden');
      
      backBtn.classList.add('hidden');
      
      switch (currentView) {
        case 'home':
          homeView.classList.remove('hidden');
          headerSubtitle.textContent = 'Kumpulan Do\'a Islami';
          break;
        case 'category':
          categoryView.classList.remove('hidden');
          backBtn.classList.remove('hidden');
          break;
        case 'detail':
          detailView.classList.remove('hidden');
          backBtn.classList.remove('hidden');
          break;
        case 'search':
          searchResults.classList.remove('hidden');
          backBtn.classList.remove('hidden');
          headerSubtitle.textContent = 'Hasil Pencarian';
          break;
      }
    }

    // Back button handler
    backBtn.addEventListener('click', () => {
      if (currentView === 'detail' && currentCategory) {
        openCategory(currentCategory.id);
      } else {
        currentView = 'home';
        searchInput.value = '';
        searchBar.classList.add('hidden');
        updateView();
      }
    });

    // Search toggle handler
    searchToggle.addEventListener('click', () => {
      searchBar.classList.toggle('hidden');
      if (!searchBar.classList.contains('hidden')) {
        searchInput.focus();
      }
    });

    // Search input handler
    let searchTimeout;
    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        performSearch(e.target.value);
      }, 300);
    });

    // Initialize Element SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          document.getElementById('headerTitle').textContent = config.app_title || defaultConfig.app_title;
          document.getElementById('welcomeText').textContent = config.welcome_text || defaultConfig.welcome_text;
        },
        mapToCapabilities: (config) => ({
          recolorables: [
            {
              get: () => config.primary_color || defaultConfig.primary_color,
              set: (value) => { config.primary_color = value; window.elementSdk.setConfig({ primary_color: value }); }
            },
            {
              get: () => config.secondary_color || defaultConfig.secondary_color,
              set: (value) => { config.secondary_color = value; window.elementSdk.setConfig({ secondary_color: value }); }
            },
            {
              get: () => config.text_color || defaultConfig.text_color,
              set: (value) => { config.text_color = value; window.elementSdk.setConfig({ text_color: value }); }
            },
            {
              get: () => config.accent_color || defaultConfig.accent_color,
              set: (value) => { config.accent_color = value; window.elementSdk.setConfig({ accent_color: value }); }
            },
            {
              get: () => config.card_color || defaultConfig.card_color,
              set: (value) => { config.card_color = value; window.elementSdk.setConfig({ card_color: value }); }
            }
          ],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['app_title', config.app_title || defaultConfig.app_title],
          ['welcome_text', config.welcome_text || defaultConfig.welcome_text]
        ])
      });
    }

    // PWA Install button
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.remove('hidden');
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      
      console.log(`Pengguna merespons dengan: ${outcome}`);
      deferredPrompt = null;
      installBtn.classList.add('hidden');
    });

    window.addEventListener('appinstalled', () => {
      console.log('Aplikasi telah diinstal');
      installBtn.classList.add('hidden');
    });

    // Initialize app
    renderCategories();
    
    // Loading state management
    function showLoadingState() {
      const loadingBar = document.getElementById('footerLoadingBar');
      loadingBar.classList.remove('hidden');
    }

    function hideLoadingState() {
      const loadingBar = document.getElementById('footerLoadingBar');
      loadingBar.classList.add('hidden');
    }
    
    function initializeApp() {
      // App initialized
    }
  </script>
